# =============================================================================
# Wellfond BMS — Production Docker Compose (11 services)
# =============================================================================
# Hardened per MEP v1.1: wal_level=replica, 3× Redis, PgBouncer, Gotenberg,
# split networks (backend_net / frontend_net).
#
# Boot:  docker compose up -d
# Check: docker compose ps
# =============================================================================

services:
  # ==========================================================================
  # PostgreSQL 17 — wal_level=replica, SCRAM auth
  # ==========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: wellfond-pg17
    environment:
      POSTGRES_DB: wellfond
      POSTGRES_USER: wellfond_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
      -c wal_level=replica
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c log_statement=none
      -c log_min_duration_statement=1000
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellfond_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # PgBouncer — transaction pooling
  # ==========================================================================
  pgbouncer:
    image: edoburu/pgbouncer:1.23.0
    container_name: wellfond-pgbouncer
    environment:
      DATABASE_URL: postgres://wellfond_app:${DB_PASSWORD}@postgres:5432/wellfond
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      ADMIN_USERS: wellfond_app
    ports:
      - "6432:5432"
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U wellfond_app"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Redis — Sessions (128 MB, LRU eviction)
  # ==========================================================================
  redis_sessions:
    image: redis:7.4-alpine
    container_name: wellfond-redis-sessions
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_sessions_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Redis — Celery Broker (256 MB, noeviction)
  # ==========================================================================
  redis_broker:
    image: redis:7.4-alpine
    container_name: wellfond-redis-broker
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save 60 1
    volumes:
      - redis_broker_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Redis — Application Cache (256 MB, LRU)
  # ==========================================================================
  redis_cache:
    image: redis:7.4-alpine
    container_name: wellfond-redis-cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_cache_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Redis — Idempotency Store (128 MB, LRU)
  # ==========================================================================
  redis_idempotency:
    image: redis:7.4-alpine
    container_name: wellfond-redis-idempotency
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_idempotency_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Django 6.0 API (ASGI via uvicorn)
  # ==========================================================================
django:
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis_sessions:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # Celery Worker — high / default / low / dlq queues
  # ==========================================================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: wellfond-celery-worker
    command: celery -A config worker -l info -Q high,default,low,dlq
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_DB: wellfond
      POSTGRES_USER: wellfond_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "5432"
      REDIS_SESSIONS_URL: redis://redis_sessions:6379/0
      REDIS_BROKER_URL: redis://redis_broker:6379/0
      REDIS_CACHE_URL: redis://redis_cache:6379/0
      REDIS_IDEMPOTENCY_URL: redis://redis_idempotency:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    networks:
      - backend_net
    depends_on:
      redis_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      replicas: 2

  # ==========================================================================
  # Celery Beat — scheduled tasks
  # ==========================================================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: wellfond-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_DB: wellfond
      POSTGRES_USER: wellfond_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "5432"
      REDIS_SESSIONS_URL: redis://redis_sessions:6379/0
      REDIS_BROKER_URL: redis://redis_broker:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    networks:
      - backend_net
    depends_on:
      redis_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ==========================================================================
  # Gotenberg — Chromium PDF generation sidecar
  # ==========================================================================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: wellfond-gotenberg
    command: gotenberg --chromium-disable-routes=false
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Next.js 16 — BFF + SSR
  # ==========================================================================
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nextjs
    container_name: wellfond-nextjs
    environment:
      BACKEND_INTERNAL_URL: http://django:8000
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3000:3000"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ==========================================================================
  # Flower — Celery monitoring dashboard
  # ==========================================================================
  flower:
    image: mher/flower:2.0
    container_name: wellfond-flower
    environment:
      FLOWER_BROKER_API: redis://redis_broker:6379/0
    ports:
      - "5555:5555"
    networks:
      - backend_net
    depends_on:
      redis_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  pg_data:
  redis_sessions_data:
  redis_broker_data:
  redis_cache_data:
  redis_idempotency_data:

# =============================================================================
# Isolated Networks
# =============================================================================
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge