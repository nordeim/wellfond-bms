# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"

  pgbouncer:
    ports:
      - "6432:5432"

  redis_sessions:
    ports:
      - "6379:6379"

  redis_broker:
    ports:
      - "6380:6379"

  redis_cache:
    ports:
      - "6381:6379"

  django:
    build:
      target: builder
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  celery_worker:
    command: celery -A config worker -l info -Q high,default,low,dlq --concurrency=2
    volumes:
      - ./backend:/app

  celery_beat:
    volumes:
      - ./backend:/app

  nextjs:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  flower:
    ports:
      - "5555:5555"
