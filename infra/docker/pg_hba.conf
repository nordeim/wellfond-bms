# PostgreSQL Client Authentication Configuration File
# Wellfond BMS - Development Environment

# Allow all local connections
local   all             all                                     trust

# IPv4 local connections:
host    all             all             127.0.0.1/32            trust

# IPv6 local connections:
host    all             all             ::1/128                 trust

# Allow Docker host connections (from host to container)
host    all             all             172.0.0.0/8             trust

# Allow Docker bridge networks
host    all             all             192.168.0.0/16          trust
host    all             all             10.0.0.0/8              trust

# Allow specific CHA YUAN user to connect from anywhere (dev only)
host    chayuan_db      chayuan_user    0.0.0.0/0               trust
host    chayuan_test_db chayuan_user    0.0.0.0/0               trust

# Replication connections (dev - trust for simplicity)
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
