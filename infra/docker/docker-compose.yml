# =============================================================================
# Wellfond BMS - Infrastructure Docker Compose
# =============================================================================
# Hybrid Development Environment:
# - Containerized: PostgreSQL 17, Redis 7.4
# - Native: Django (localhost:8000), Next.js (localhost:3000), Celery
#
# For full containerization (production), see docker-compose.prod.yml
# =============================================================================

services:
  # ============================================================================
  # PostgreSQL 17 - Database
  # ============================================================================
  postgres:
    image: postgres:17-trixie
    container_name: wellfond-postgres
    environment:
      POSTGRES_DB: wellfond_db
      POSTGRES_USER: wellfond_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wellfond_dev_password}
      POSTGRES_HOST_AUTH_METHOD: trust          # development‑only trust mode
      TZ: Asia/Singapore
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c timezone=Asia/Singapore
      -c log_destination=stderr
      -c logging_collector=off
      -c log_min_messages=warning
      -c wal_level=replica
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellfond_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wellfond-network
    restart: unless-stopped

  # ============================================================================
  # Redis 7.4 - Cache, Sessions, Message Broker
  # ============================================================================
  redis:
    image: redis:7.4-alpine
    container_name: wellfond-redis
    # Development: no password on Redis. If you need one later, add
    # REDIS_PASSWORD to .env and append "--requirepass ${REDIS_PASSWORD}" below.
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
      --loglevel warning
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - wellfond-network
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  wellfond-network:
    driver: bridge